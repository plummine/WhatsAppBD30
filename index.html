<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMiner AI - Secure Node</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #25D366;
            --mirror-glass: rgba(255, 255, 255, 0.1);
            --bg-dark: #0b141a;
            --instruction-bg: #1f2c34;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Dashboard View */
        .view { display: none; height: 100%; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .active-view { display: flex; }

        .balance-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(15px);
            border: 1px solid var(--mirror-glass);
            padding: 20px; border-radius: 15px; text-align: center;
        }

        .points { font-size: 35px; font-weight: bold; color: var(--primary); }

        /* Task Container - Optimized for Scrolling */
        .task-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 70px; /* Space for bottom nav */
        }

        .instruction-bar {
            background: var(--instruction-bg);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            color: #25D366;
            text-align: center;
            border: 1px dashed var(--primary);
        }

        .iframe-wrapper {
            position: relative;
            flex-grow: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #1f2c34;
            background: white;
        }

        /* উপরের কালার মাস্ক - হালকা আয়না ইফেক্ট */
        .mirror-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 45px;
            background: linear-gradient(to bottom, rgba(220, 248, 198, 0.5), transparent);
            backdrop-filter: blur(2px);
            z-index: 5;
            pointer-events: none;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-verify {
            background: #25D366;
            color: white; border: none; padding: 15px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            width: 100%; font-size: 16px; margin-top: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Navbar */
        .nav {
            position: fixed; bottom: 0; width: 100%;
            background: #1f2c34; display: flex;
            justify-content: space-around; padding: 10px 0;
            z-index: 100;
        }
        .nav-item { color: #8696a0; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--primary); }
    </style>
</head>
<body>

<div id="view-main" class="view active-view">
    <div class="balance-card">
        <div style="color: #8696a0; font-size: 13px;">Cloud Mining Balance</div>
        <div class="points" id="mainPoints">0.00 PT</div>
        <div id="status" style="font-size: 12px; color: #ffbc00;">● Connection Standby</div>
    </div>
    <div style="margin-top: 20px;">
        <button class="btn-verify" onclick="openTask()">Start Mining Task</button>
    </div>
</div>

<div id="view-task" class="view">
    <div class="task-container">
        <div class="instruction-bar">
            <i class="fas fa-info-circle"></i> হোয়াটসঅ্যাপ অ্যাড করে নিচের বাটনে ক্লিক করুন
        </div>
        
        <div class="iframe-wrapper">
            <div class="mirror-mask"></div>
            <iframe src="about:blank" id="taskIframe"></iframe>
        </div>

        <button class="btn-verify" id="verifyBtn" onclick="verifyConnection()">
            Verify & Start Earning
        </button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item nav-active"><i class="fas fa-hammer"></i><br>Mining</div>
    <div class="nav-item"><i class="fas fa-wallet"></i><br>Withdraw</div>
    <div class="nav-item"><i class="fas fa-headset"></i><br>Support</div>
</nav>

<script src="script.js"></script>
</body>
</html>
