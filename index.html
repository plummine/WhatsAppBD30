<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Cloud Miner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #25D366; --bg: #0b141a; --yellow: #ffd700; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        /* লোগো মাস্ক (কালো স্টিকার) */
        .logo-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100px;
            background: black; z-index: 500; display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: var(--primary); font-weight: bold; border-bottom: 2px solid #333;
        }

        .app-view { display: none; height: 100vh; flex-direction: column; position: relative; }
        .active { display: flex; }

        /* আইফ্রেম কন্টেইনার */
        .iframe-container { 
            flex-grow: 1; margin-top: 100px; background: #fff;
            height: calc(100vh - 260px); position: relative;
        }
        .scroll-locked { overflow: hidden !important; pointer-events: none; }
        .scroll-allowed { overflow-y: auto !important; -webkit-overflow-scrolling: touch; }

        iframe { width: 100%; height: 100%; border: none; }

        /* মাইনিং এনিমেশন */
        .mining-anim {
            width: 80px; height: 80px; border: 5px dashed var(--primary);
            border-radius: 50%; margin: 20px auto;
            animation: rotate 4s linear infinite;
            display: none; /* মাইনিং শুরু হলে দেখাবে */
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .pulse {
            width: 10px; height: 10px; background: var(--primary);
            border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px var(--primary);
            animation: blink 1s infinite;
        }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* নেভিগেশন */
        .bottom-nav {
            height: 80px; background: #1f2c34; display: flex;
            justify-content: space-around; align-items: center;
            border-top: 3px solid var(--primary); position: fixed; bottom: 0; width: 100%; z-index: 2000;
        }
        .nav-item { flex: 1; text-align: center; color: #8696a0; font-size: 13px; cursor: pointer; }
        .nav-item i { font-size: 26px; display: block; margin-bottom: 5px; }
        .nav-item.active-nav { color: var(--primary); }

        .btn-main {
            background: var(--primary); color: white; border: none; padding: 18px;
            width: 90%; border-radius: 12px; font-weight: bold; font-size: 16px;
            margin: 10px auto; display: block; cursor: pointer;
        }
        .stat-box {
            background: linear-gradient(135deg, #121b22, #1f2c34);
            padding: 30px; margin: 25px; border-radius: 25px; text-align: center; border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="logo-mask">SECURE CLOUD NODE ACTIVATED</div>

<div id="main-app" style="height: 100%;">
    
    <div id="view-work" class="app-view active">
        <div id="ifr-box" class="iframe-container scroll-locked">
            <iframe src="https://www.taskm4u.com/#/login" id="taskIfr"></iframe>
        </div>
        <div style="background: #121b22; padding: 10px; padding-bottom: 90px;">
            <button class="btn-main" id="step-btn" onclick="handleStep()">লগইন করেছি, পরবর্তী ধাপ</button>
        </div>
    </div>

    <div id="view-balance" class="app-view">
        <div class="stat-box">
            <div class="mining-anim" id="gear"></div>
            <p style="color:#8696a0; margin-bottom: 5px;">Live Mined Balance</p>
            <div style="font-size: 50px; font-weight: bold; color: var(--primary);" id="main-bal">0.00 PT</div>
            <div id="status-tag" style="margin-top:15px; font-size: 14px; color: #8696a0;">
                <span id="p-light"></span> <span id="p-text">System Standby</span>
            </div>
        </div>
        <div style="padding: 0 25px;">
            <div style="background: #1f2c34; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between;">
                <span>Hashrate:</span> <span style="color:var(--yellow);" id="h-rate">0.00 GH/s</span>
            </div>
        </div>
    </div>

    <div id="view-withdraw" class="app-view">
        <div class="stat-box"><h3>Withdraw</h3><p>Min: 10,000 PT</p></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" id="n-work" onclick="showView('work')"><i class="fas fa-hammer"></i>Work</div>
        <div class="nav-item" id="n-balance" onclick="showView('balance')"><i class="fas fa-coins"></i>Balance</div>
        <div class="nav-item" id="n-withdraw" onclick="showView('withdraw')"><i class="fas fa-wallet"></i>Withdraw</div>
    </nav>
</div>

<script src="script.js"></script>
</body>
</html>
